name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.HOMEBREW_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6.0.2
        with:
          token: ${{ steps.app_token.outputs.token }}

      - name: Update formula
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA_AMD64: ${{ github.event.client_payload.sha256_amd64 }}
          SHA_ARM64: ${{ github.event.client_payload.sha256_arm64 }}
        run: |
          VERSION="${VERSION#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/luadata.rb
          sed -i "0,/sha256 \".*\"/{s/sha256 \".*\"/sha256 \"${SHA_ARM64}\"/}" Formula/luadata.rb
          sed -i "0,/sha256 \".*\"/! {0,/sha256 \".*\"/ s/sha256 \".*\"/sha256 \"${SHA_AMD64}\"/}" Formula/luadata.rb

      - name: Commit and push
        run: |
          git config user.name "mmobeus-homebrew-updater[bot]"
          git config user.email "mmobeus-homebrew-updater[bot]@users.noreply.github.com"
          git add Formula/luadata.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update luadata to ${VERSION}"
          git push
